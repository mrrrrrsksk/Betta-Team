<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Synchronization</title>
</head>

<body>

    <header>
        <div class="container">
            <div class="header-part1">
                <img src="img/logodark.svg" alt="logo" id="header-logo">
            </div>

            <div class="header-part2">
                <div class="info">
                    <img src="img/globe.svg" alt="globe">
                    <p class="header-p">онлайн-курс</p>
                </div>

                <div class="info">
                    <img src="img/time.svg" alt="time">
                    <p class="header-p">18 часов</p>
                </div>

                <div class="info">
                    <img src="img/calendar.svg" alt="calendar">
                    <p class="header-p">8 сентября</p>
                </div>
            </div>

            <br>

            <div class="header-part3">
                <div class="headertext">
                    <h1>Как смотреть кино</h1>

                    <p class="header-p">За 8 занятий станем активными зрителями и разберёмся в кинопроцессе</p>
                </div>

                <div class="h-pic">
                    <img src="img/Group2.svg" alt="producer" class="header-person">
                </div>

                <div class="header-bluebox">
                    <div class="header-p2">
                        <p class="viewer">Зритель для меня не потребитель моей продукции, не судья, а соучастник
                            творчества,
                            соавтор.</p>
                        <p class="tarkovskiy">Андрей Тарковский</p>
                    </div>
                </div>

            </div>
        </div>
    </header>

    <main>
        <section id="about">
            <div class="container"></div>
        </section>

        <section id="format">
            <div class="container"></div>
        </section>

        <section id="info-section">
            <div class="container"></div>
        </section>

        <section id="program">
            <div class="container"></div>
        </section>
    </main>

    <div id="bg-grey">
        <div class="container"></div>
    </div>

    <div id="bg-green">
        <div class="container"></div>
    </div>

    <footer>
        <div class="container"></div>
    </footer>

</body>

</html>
